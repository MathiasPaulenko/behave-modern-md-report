name: Release

# Fully automatic release pipeline.
#
# Trigger:
#   - Every push to `main` (typically after merging a PR).
#   - Manual via the "Run workflow" button.
#
# Behaviour:
#   1. Reads the version from `pyproject.toml`.
#   2. If a git tag `vX.Y.Z` for that version already exists -> exits cleanly
#      (nothing to do, no release).
#   3. Otherwise: creates and pushes the tag, builds sdist + wheel,
#      publishes to PyPI via Trusted Publishing, and creates a GitHub Release
#      with auto-generated notes.
#
# To cut a new release: bump `version` in pyproject.toml, commit, push. Done.

on:
  push:
    branches: [main]
    paths:
      - "pyproject.toml"
      - "behave_modern_md_report/**"
      - ".github/workflows/release.yml"
  workflow_dispatch:

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  # ----------------------------------------------------------------------
  # 1. Decide whether we need to release at all.
  # ----------------------------------------------------------------------
  detect:
    name: Detect version bump
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.read.outputs.version }}
      tag: ${{ steps.read.outputs.tag }}
      should_release: ${{ steps.check.outputs.should_release }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # need full history to see existing tags

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - id: read
        name: Read version from pyproject.toml
        run: |
          VERSION=$(python -c "import tomllib,pathlib;print(tomllib.loads(pathlib.Path('pyproject.toml').read_text())['project']['version'])")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION"    >> "$GITHUB_OUTPUT"
          echo "Project version: $VERSION"

      - id: check
        name: Check whether the tag already exists
        run: |
          TAG="${{ steps.read.outputs.tag }}"
          if git rev-parse --verify --quiet "refs/tags/$TAG" >/dev/null; then
            echo "Tag $TAG already exists - nothing to release."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          else
            echo "Tag $TAG is new - will release."
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          fi

  # ----------------------------------------------------------------------
  # 2. Tag the release commit (only if version was bumped).
  # ----------------------------------------------------------------------
  tag:
    name: Create git tag
    needs: detect
    if: needs.detect.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Create and push tag
        run: |
          TAG="${{ needs.detect.outputs.tag }}"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"

  # ----------------------------------------------------------------------
  # 3. Build the distribution artifacts.
  # ----------------------------------------------------------------------
  build:
    name: Build distribution
    needs: [detect, tag]
    if: needs.detect.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.detect.outputs.tag }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build sdist + wheel
        run: python -m build

      - name: Validate distributions
        run: twine check dist/*

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  # ----------------------------------------------------------------------
  # 4. Publish to PyPI via OIDC Trusted Publishing (no tokens).
  # ----------------------------------------------------------------------
  publish:
    name: Publish to PyPI
    needs: [detect, build]
    if: needs.detect.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/behave-modern-md-report
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/

  # ----------------------------------------------------------------------
  # 5. Create the GitHub Release with auto-generated notes.
  # ----------------------------------------------------------------------
  github-release:
    name: Create GitHub Release
    needs: [detect, publish]
    if: needs.detect.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.detect.outputs.tag }}
          name: ${{ needs.detect.outputs.tag }}
          generate_release_notes: true
          files: dist/*
